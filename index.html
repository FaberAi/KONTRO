<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>KONTRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0B0B0B;
  color: white;
}

.container {
  padding: 40px;
  max-width: 900px;
  margin: auto;
}

h1 {
  margin-bottom: 10px;
}

input, select {
  padding: 10px;
  margin-right: 10px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px 20px;
  background: #00C897;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.totale {
  margin-top: 20px;
  font-size: 20px;
}

.mov {
  padding: 10px;
  border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<div class="container">
  <h1>KONTRO</h1>
  <p>Gestione reale dei movimenti</p>

  <input id="desc" placeholder="Descrizione">
  <input id="imp" type="number" placeholder="Importo">

  <select id="tipo">
    <option value="entrata">Entrata</option>
    <option value="uscita">Uscita</option>
  </select>

  <button onclick="aggiungi()">+ Movimento</button>

  <div class="totale" id="totale">Totale: €0</div>

  <div id="lista"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://imghqxftitokjkajtjjc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImltZ2hxeGZ0aXRva2prYWp0ampjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzE5MzMsImV4cCI6MjA5MTM0NzkzM30.-K5I31r8vVLwsSGliugnb0Q0v2sxlZbS2b9d6Yrs3qY"
);

async function aggiungi() {
  const descrizione = document.getElementById("desc").value;
  const importo = parseFloat(document.getElementById("imp").value);
  const tipo = document.getElementById("tipo").value;

  if (!descrizione || isNaN(importo)) {
    alert("Compila i campi");
    return;
  }

  const valore = tipo === "uscita" ? -importo : importo;

  const { error } = await client
    .from("movimenti")
    .insert([{
      descrizione,
      importo: valore,
      data: new Date().toISOString()
    }]);

  if (error) {
    alert("Errore: " + error.message);
    return;
  }

  document.getElementById("desc").value = "";
  document.getElementById("imp").value = "";

  carica();
}

async function carica() {
  const { data, error } = await client
    .from("movimenti")
    .select("*")
    .order("data", { ascending: false });

  if (error) {
    alert(error.message);
    return;
  }

  let totale = 0;
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(m => {
    totale += Number(m.importo);

    const colore = m.importo >= 0 ? "#00C897" : "#ff4d4d";

    lista.innerHTML += `
      <div class="mov" style="color:${colore}">
        ${m.descrizione} - €${m.importo}
      </div>
    `;
  });

  document.getElementById("totale").innerText = "Totale: €" + totale;
}

carica();
</script>

</body>
</html>
