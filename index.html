<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>KONTRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0B0B0B;
  color: white;
}

.layout {
  display: flex;
}

.sidebar {
  width: 220px;
  background: #111;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #1a1a1a;
  color: white;
  border: none;
  cursor: pointer;
  text-align: left;
}

.main {
  flex: 1;
  padding: 30px;
}

.card {
  background: #111;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
}

input, select {
  padding: 10px;
  margin-right: 10px;
  border-radius: 5px;
  border: none;
}

button.action {
  background: #00C897;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
}

.mov {
  padding: 10px;
  border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>KONTRO</h2>

    <button onclick="show('dashboard')">Dashboard</button>
    <button onclick="show('primanota')">Prima Nota</button>
    <button onclick="show('fornitori')">Fornitori</button>
    <button onclick="show('banca')">Banca</button>
    <button onclick="show('assegni')">Assegni</button>
    <button onclick="show('report')">Report</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard" class="section">
      <div class="card">
        <h2>Dashboard</h2>
        <p id="totale">Totale: €0</p>
      </div>
    </div>

    <!-- PRIMA NOTA -->
    <div id="primanota" class="section" style="display:none;">
      <div class="card">
        <h2>Prima Nota</h2>

        <input id="desc" placeholder="Descrizione">
        <input id="imp" type="number" placeholder="Importo">

        <select id="tipo">
          <option value="entrata">Entrata</option>
          <option value="uscita">Uscita</option>
        </select>

        <select id="fornitore_select">
          <option value="">Seleziona fornitore</option>
        </select>

        <button class="action" onclick="aggiungi()">Aggiungi</button>

        <div id="lista"></div>
      </div>
    </div>

    <!-- FORNITORI -->
    <div id="fornitori" class="section" style="display:none;">
      <div class="card">
        <h2>Fornitori</h2>

        <input id="nome_fornitore" placeholder="Nome fornitore">

        <button class="action" onclick="aggiungiFornitore()">Aggiungi Fornitore</button>

        <div id="lista_fornitori"></div>
      </div>
    </div>

    <!-- BANCA -->
    <div id="banca" class="section" style="display:none;">
      <div class="card">
        <h2>Banca</h2>
        <p>Modulo in costruzione</p>
      </div>
    </div>

    <!-- ASSEGNI -->
    <div id="assegni" class="section" style="display:none;">
      <div class="card">
        <h2>Assegni</h2>
        <p>Modulo in costruzione</p>
      </div>
    </div>

    <!-- REPORT -->
    <div id="report" class="section" style="display:none;">
      <div class="card">
        <h2>Report</h2>
        <p>Modulo in costruzione</p>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://imghqxftitokjkajtjjc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImltZ2hxeGZ0aXRva2prYWp0ampjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NzE5MzMsImV4cCI6MjA5MTM0NzkzM30.-K5I31r8vVLwsSGliugnb0Q0v2sxlZbS2b9d6Yrs3qY"
);

/* NAV */
function show(sezione) {
  document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
  document.getElementById(sezione).style.display = 'block';
}

/* AGGIUNTA FORNITORE */
async function aggiungiFornitore() {
  const nome = document.getElementById("nome_fornitore").value;

  if (!nome) {
    alert("Inserisci nome");
    return;
  }

  await client.from("fornitori").insert([{ nome }]);

  document.getElementById("nome_fornitore").value = "";

  caricaFornitori();
}

/* CARICA FORNITORI */
async function caricaFornitori() {
  const { data } = await client.from("fornitori").select("*");

  const lista = document.getElementById("lista_fornitori");
  const select = document.getElementById("fornitore_select");

  lista.innerHTML = "";
  select.innerHTML = '<option value="">Seleziona fornitore</option>';

  data.forEach(f => {
    lista.innerHTML += `<div class="mov">${f.nome}</div>`;
    select.innerHTML += `<option value="${f.nome}">${f.nome}</option>`;
  });
}

/* AGGIUNTA MOVIMENTO */
async function aggiungi() {
  const descrizione = document.getElementById("desc").value;
  const importo = parseFloat(document.getElementById("imp").value);
  const tipo = document.getElementById("tipo").value;
  const fornitore = document.getElementById("fornitore_select").value;

  if (!descrizione || isNaN(importo)) {
    alert("Compila i campi");
    return;
  }

  const valore = tipo === "uscita" ? -importo : importo;

  await client.from("movimenti").insert([{
    descrizione,
    importo: valore,
    fornitore,
    data: new Date().toISOString()
  }]);

  document.getElementById("desc").value = "";
  document.getElementById("imp").value = "";

  carica();
}

/* CARICA MOVIMENTI */
async function carica() {
  const { data } = await client
    .from("movimenti")
    .select("*")
    .order("data", { ascending: false });

  let totale = 0;
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(m => {
    totale += Number(m.importo);

    const colore = m.importo >= 0 ? "#00C897" : "#ff4d4d";

    lista.innerHTML += `
      <div class="mov" style="color:${colore}">
        ${m.descrizione} - €${m.importo} - ${m.fornitore || ""}
      </div>
    `;
  });

  document.getElementById("totale").innerText = "Totale: €" + totale;
}

/* INIT */
carica();
caricaFornitori();
</script>

</body>
</html>
